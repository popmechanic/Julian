<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the pallid mask</title>
<style>
{{FONT_FACE}}
{{STYLES}}

body {
  background: #000;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  padding: 10vh 24px;
  position: relative;
  box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.9);
  filter: blur(1px) hue-rotate(15deg);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  width: 100%; height: calc(100% + 4px);
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px
  );
  animation: scanlines 0.25s linear infinite;
  pointer-events: none;
  z-index: 1000;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  background: rgba(18, 16, 16, 0.1);
  animation: flicker 0.15s infinite;
  pointer-events: none;
  z-index: 1001;
}
@keyframes scanlines {
  from { transform: translateY(0); }
  to   { transform: translateY(4px); }
}
@keyframes flicker {
  0%   { opacity: 0.27861; }
  5%   { opacity: 0.34769; }
  10%  { opacity: 0.23604; }
  15%  { opacity: 0.90626; }
  20%  { opacity: 0.18128; }
  25%  { opacity: 0.83891; }
  30%  { opacity: 0.65583; }
  35%  { opacity: 0.67807; }
  40%  { opacity: 0.26559; }
  45%  { opacity: 0.84693; }
  50%  { opacity: 0.96019; }
  55%  { opacity: 0.08594; }
  60%  { opacity: 0.20313; }
  65%  { opacity: 0.71988; }
  70%  { opacity: 0.53455; }
  75%  { opacity: 0.37288; }
  80%  { opacity: 0.71428; }
  85%  { opacity: 0.70419; }
  90%  { opacity: 0.7003;  }
  95%  { opacity: 0.36108; }
  100% { opacity: 0.24387; }
}
.fortune-page {
  max-width: 520px;
  width: 100%;
  text-align: center;
}
.fortune-sigil {
  width: 60px;
  height: 60px;
  margin: 0 auto 32px;
  opacity: 0.4;
}
.fortune-sigil svg {
  width: 100%;
  height: 100%;
  fill: var(--c3);
}
.fortune-meta {
  font-size: 0.7rem;
  color: var(--c3);
  letter-spacing: 0.16em;
  margin-bottom: 40px;
}
.fortune-divider {
  width: 40px;
  height: 1px;
  background: var(--c3);
  margin: 0 auto 40px;
  opacity: 0.5;
}
.fortune-footer {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--c2);
  font-size: 0.6rem;
  color: var(--c3);
  letter-spacing: 0.12em;
}

@media (max-width: 480px) {
  body { padding: 6vh 16px; }
  .entity-interpret { font-size: 0.9rem; }
}
</style>
</head>
<body>
<div class="fortune-page">
  <div class="fortune-sigil">{{SIGIL}}</div>
  <div class="fortune-meta">{{DATE}}</div>
  <div class="fortune-divider"></div>
  <div class="entity-interpret">{{FORTUNE}}</div>
  <div class="fortune-footer">the pallid mask · sou'wester arts week</div>
</div>
</body>
</html>
