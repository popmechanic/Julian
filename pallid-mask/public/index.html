<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the pallid mask</title>
<link rel="stylesheet" href="/styles.css">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="the pallid mask">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta property="og:title" content="the pallid mask">
<meta property="og:description" content="sou'wester arts week 2026 · ilwaco, washington">
<meta property="og:image" content="/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/og-image.png">
</head>
<body>
<div id="sigil-frame"></div>
<div class="screen">

  <!-- ── TOP BAND ── -->
  <div class="band band-top">
    <div class="sigil-slot sigil-banner-slot" id="sigil-top"></div>

  </div><!-- /band-top -->


  <!-- ── CENTER ── -->
  <div class="center">

    <!-- THE MASK -->
    <div class="mask-wrap mask-hidden">
      <!-- Triple-layer Gaussian bloom from mask.html, adapted to our palette -->
      <svg viewBox="230 75 350 505" width="230" height="332"
           xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="vector-glow" x="-60%" y="-40%" width="220%" height="180%">
            <feGaussianBlur stdDeviation="1.7"  result="blur1"/>
            <feGaussianBlur stdDeviation="5"    result="blur2"/>
            <feGaussianBlur stdDeviation="10"   result="blur3"/>
            <feMerge>
              <feMergeNode in="blur3"/>
              <feMergeNode in="blur2"/>
              <feMergeNode in="blur1"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <g filter="url(#vector-glow)">
          <!-- brow notch — the concave V that marks this as a wearable mask -->
          <path class="glow-line-bright" d="M 330 110 Q 400 180 470 110"/>
          <path class="glow-line"        d="M 342 128 Q 400 195 458 128"/>
          <path class="glow-line"        d="M 330 110 L 342 128"/>
          <path class="glow-line"        d="M 470 110 L 458 128"/>

          <!-- face outline -->
          <path id="face-left"  class="glow-line-bright" d="M 330 110 C 260 140 240 260 270 370 C 290 450 340 520 400 550"/>
          <path id="face-right" class="glow-line-bright" d="M 470 110 C 540 140 560 260 530 370 C 510 450 460 520 400 550"/>

          <!-- eyes — whole eye collapses to flat line on blink -->
          <g class="eye-group" id="eye-left">
            <path class="glow-line-bright" d="M 290 235 L 380 235"/>
            <path class="glow-line"        d="M 290 235 L 305 270 Q 340 295 380 235"/>
            <path class="glow-line-faint"  d="M 305 270 Q 330 280 355 260"/>
          </g>
          <g class="eye-group" id="eye-right">
            <path class="glow-line-bright" d="M 420 235 L 510 235"/>
            <path class="glow-line"        d="M 420 235 Q 465 275 495 260 L 510 235"/>
            <path class="glow-line-faint"  d="M 445 260 Q 470 270 495 260"/>
          </g>

          <!-- nose — long vertical descending line -->
          <path class="glow-line"        d="M 380 235 L 388 385 L 400 405 L 412 385 L 420 235"/>
          <path class="glow-line"        d="M 375 375 L 400 395 L 425 375"/>

          <!-- mouth — da Vinci-inspired: Cupid's bow upper, full lower arc,
               corners closed but asymmetric (right lifts 3 units higher),
               opening only at the center. the secret is in the asymmetry. -->
          <path id="mouth-upper" class="glow-line-bright" d="M 363 452 C 375 444 390 443 400 447 C 410 443 425 444 439 449"/>
          <path id="mouth-lower" class="glow-line"        d="M 363 452 Q 400 463 439 449"/>

          <!-- crinkle lines — outer eye corners, invisible until smile -->
          <path class="eye-crinkle glow-line-faint" d="M 289 250 Q 275 258 268 268"/>
          <path class="eye-crinkle glow-line-faint" d="M 511 247 Q 525 255 532 265"/>

          <!-- cheek structure lines -->
          <path id="cheek-left"   class="glow-line" d="M 345 390 L 325 450 L 340 510"/>
          <path id="cheek-right"  class="glow-line" d="M 455 390 L 475 450 L 460 510"/>
          <path id="cheek-bottom" class="glow-line" d="M 375 510 L 400 520 L 425 510"/>

          <!-- faint structural geometry -->
          <path class="glow-line-faint"  d="M 270 370 L 315 415 L 340 480"/>
          <path class="glow-line-faint"  d="M 530 370 L 485 415 L 460 480"/>

          <!-- vertex nodes — electron beam dwell points -->
          <circle cx="330" cy="110" r="1.5" fill="var(--c6)"/>
          <circle cx="470" cy="110" r="1.5" fill="var(--c6)"/>
          <circle cx="290" cy="235" r="1.5" fill="var(--c6)"/>
          <circle cx="380" cy="235" r="1.5" fill="var(--c6)"/>
          <circle cx="420" cy="235" r="1.5" fill="var(--c6)"/>
          <circle cx="510" cy="235" r="1.5" fill="var(--c6)"/>
          <circle cx="400" cy="550" r="1.5" fill="var(--c6)"/>
        </g>
      </svg>
    </div>

    <!-- Text exchange area — ceremony overlay handles all dynamic text -->

  </div><!-- /center -->


</div><!-- /screen -->

<div id="ceremony-overlay"></div>

<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<script type="module" src="/dist/main.js"></script>
</body>
</html>
