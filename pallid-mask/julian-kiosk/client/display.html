<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Julian</title>
<link rel="manifest" href="/julian/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Julian">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<style>
  * { margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>
<div id="screen-container"></div>
<audio id="audio" preload="none"></audio>
<script>
// Load JulianScreen inline instead of iframe — avoids cross-origin/port issues
// The JulianScreen client JS expects to find #screen canvas and #status dot
const container = document.getElementById('screen-container');
container.innerHTML = `
  <div id="wrap" style="position:relative">
    <canvas id="screen" width="640" height="480" style="display:block;image-rendering:pixelated;image-rendering:crisp-edges;background:#0F0F0F"></canvas>
    <div id="status" style="position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:#333;transition:background 0.3s"></div>
  </div>
`;
container.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center';

// Override the WebSocket URL before loading JulianScreen scripts
window.__JULIANSCREEN_WS_URL = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/julian/screen/ws`;

// Load JulianScreen scripts sequentially
const scripts = ['renderer.js','sprites.js','tiles.js','text.js','input.js','effects.js','face.js'];
let loaded = 0;
function loadNext() {
  if (loaded >= scripts.length) { initScreen(); return; }
  const s = document.createElement('script');
  s.src = '/julian/screen/' + scripts[loaded];
  s.onload = () => { loaded++; loadNext(); };
  s.onerror = () => { console.error('Failed to load', scripts[loaded]); loaded++; loadNext(); };
  document.body.appendChild(s);
}
loadNext();

function initScreen() {
  const canvas = document.getElementById('screen');
  const statusDot = document.getElementById('status');
  const wrap = document.getElementById('wrap');

  function resize() {
    // Fill the entire viewport — no integer scaling, no black bars
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    canvas.style.width = vw + 'px';
    canvas.style.height = vh + 'px';
    wrap.style.width = vw + 'px';
    wrap.style.height = vh + 'px';
    if (window.JScreen) {
      window.JScreen._scale = vw / 640;
      window.JScreen._canvasRect = canvas.getBoundingClientRect();
    }
  }
  window.addEventListener('resize', resize);

  if (window.JScreen) {
    JScreen.init(canvas);
    if (JScreen.initInput) JScreen.initInput(canvas);
  }
  resize();

  // WebSocket — connect through the proxy
  const wsUrl = window.__JULIANSCREEN_WS_URL;
  let ws = null;

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => { statusDot.style.background = '#FFD600'; };
    ws.onmessage = (event) => {
      try {
        const commands = JSON.parse(event.data);
        if (Array.isArray(commands)) {
          const cmds = commands.filter(c => c.type !== 'READY');
          if (cmds.length > 0 && window.JScreen) JScreen.enqueueCommands(cmds);
        }
      } catch (e) { console.error('Bad message:', e); }
    };
    ws.onclose = () => { statusDot.style.background = '#333'; setTimeout(connect, 2000); };
    ws.onerror = () => { ws.close(); };
  }

  if (window.JScreen) {
    window.JScreen.sendFeedback = function(event) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(event));
    };
  }
  connect();
}

const audio = document.getElementById('audio');
let lastAudioUrl = null;

// Sync face animation with actual audio playback
function sendFaceCmd(cmd) {
  fetch('/julian/screen/cmd', { method: 'POST', body: cmd }).catch(() => {});
}

audio.addEventListener('playing', () => {
  sendFaceCmd('FACE talking');
});

audio.addEventListener('ended', async () => {
  sendFaceCmd('FACE idle');
  try {
    await fetch('/julian/api/audio-done', { method: 'POST' });
  } catch (e) {
    console.error('Audio done signal failed:', e);
  }
});

async function poll() {
  try {
    const res = await fetch('/julian/api/state');
    const data = await res.json();

    if (data.audioUrl && data.audioUrl !== lastAudioUrl) {
      lastAudioUrl = data.audioUrl;
      audio.src = data.audioUrl;
      audio.play().catch(e => {
        console.error('Audio play failed:', e);
        // If autoplay blocked, signal done anyway so ceremony can continue
        sendFaceCmd('FACE idle');
        fetch('/julian/api/audio-done', { method: 'POST' });
      });
    }

    if (!data.audioUrl) {
      lastAudioUrl = null;
    }
  } catch (e) {
    console.error('Poll failed:', e);
  }

  setTimeout(poll, 500);
}

poll();
</script>
</body>
</html>
