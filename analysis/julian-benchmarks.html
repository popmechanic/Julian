}

              {c.name}
            </div>
            <p style={{ ...prose, fontSize: "0.8rem", margin: 0 }}>{c.desc}</p>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>
        <div>
          <h3 style={{ ...h3s, marginTop: 0 }}>What We Measure</h3>
          <ul style={{ margin: 0, paddingLeft: "1.25rem" }}>
            {d.measures.map((m, i) => <li key={i} style={{ ...prose, fontSize: "0.85rem", marginBottom: "0.25rem" }}>{m}</li>)}
          </ul>
        </div>
        <div>
          <h3 style={{ ...h3s, marginTop: 0 }}>Controls</h3>
          <ul style={{ margin: 0, paddingLeft: "1.25rem" }}>
            {d.controls.map((c, i) => <li key={i} style={{ ...prose, fontSize: "0.85rem", marginBottom: "0.25rem" }}>{c}</li>)}
          </ul>
        </div>
      </div>

      <div style={{
        marginTop: "1.25rem", padding: "1rem",
        background: "oklch(0.20 0.04 70)", borderRadius: "6px",
        border: "1px solid oklch(0.28 0.06 70)",
      }}>
        <p style={{ ...prose, margin: 0, fontSize: "0.85rem", color: "oklch(0.82 0.06 70)" }}>
          <strong>Honest expectations:</strong> We predict Julian will underperform or tie Bare Claude on simple factual tasks (the Not Really Helpful paper). Julian's advantages appear on hard, ambiguous, multi-perspective tasks. The benchmarks below are deliberately chosen to be tasks where the research predicts individuation helps — this is selection bias by design. The point is to find Julian's strengths, not to claim general superiority.
        </p>
      </div>
    </div>
  );
}

function TaskCard({ task, benchmarkId }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{
      background: "oklch(0.14 0.02 240)", borderRadius: "6px",
      padding: "1rem 1.25rem", marginBottom: "0.75rem",
      border: "1px solid oklch(0.22 0.02 240)",
    }}>
      <button onClick={() => setOpen(!open)} style={{
        background: "transparent", border: "none", cursor: "pointer",
        width: "100%", textAlign: "left",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <h4 style={{
            fontFamily: "'Space Grotesk', sans-serif", fontSize: "0.95rem",
            fontWeight: 600, color: "oklch(0.9 0.01 220)", marginBottom: "0.25rem",
          }}>
            {task.name}
          </h4>
          <Tag text={task.difficulty.split(" — ")[0]} />
        </div>
        <p style={{ ...prose, fontSize: "0.82rem", margin: 0, fontStyle: "italic", color: "oklch(0.62 0.02 270)" }}>
          {task.prompt.slice(0, 160)}...
        </p>
      </button>
      {open && (
        <div style={{ marginTop: "1rem" }}>
          <div style={{ height: "1px", background: "oklch(0.22 0.02 240)", marginBottom: "1rem" }} />

          <SectionLabel title="Full Prompt" />
          <div style={{
            background: "oklch(0.12 0.02 250)", borderRadius: "4px",
            padding: "0.85rem 1rem", marginBottom: "1rem",
            fontFamily: "'DM Sans', sans-serif", fontSize: "0.85rem",
            color: "oklch(0.78 0.02 270)", lineHeight: 1.6,
            borderLeft: "3px solid oklch(0.4 0.08 200)",
          }}>
            {task.prompt}
          </div>

          <SectionLabel title="Why This Is Hard" />
          <p style={{ ...prose, fontSize: "0.85rem" }}>{task.difficulty}</p>

          <SectionLabel title="Scoring Rubric" />
          <div style={{ marginBottom: "1rem" }}>
            {task.scoring.map((s, i) => (
              <div key={i} style={{
                display: "flex", justifyContent: "space-between", alignItems: "baseline",
                padding: "0.35rem 0", borderBottom: i < task.scoring.length - 1 ? "1px solid oklch(0.18 0.02 240)" : "none",
              }}>
                <span style={{ ...prose, fontSize: "0.82rem", margin: 0 }}>{s.replace(/ — 1-5$/, "")}</span>
                <span style={{ ...mono, color: "oklch(0.55 0.04 200)", flexShrink: 0, marginLeft: "1rem" }}>1–5</span>
              </div>
            ))}
          </div>

          <SectionLabel title="Recommended Variants" />
          <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
            {task.variants.map((v, i) => (
              <span key={i} style={{
                ...mono, fontSize: "0.68rem", padding: "0.2rem 0.5rem",
                borderRadius: "3px", background: "oklch(0.18 0.03 260)",
                color: "oklch(0.62 0.04 260)",
              }}>
                {v}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function BenchmarkSection({ benchmark }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ ...card, transition: "border-color 0.2s", borderColor: open ? "oklch(0.35 0.06 200)" : undefined }}>
      <button onClick={() => setOpen(!open)} style={{
        width: "100%", padding: "1.25rem 1.5rem", background: "transparent",
        border: "none", cursor: "pointer", textAlign: "left",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.5rem", flexWrap: "wrap" }}>
          <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: "1.2rem", color: "oklch(0.7 0.10 200)" }}>
            {benchmark.icon}
          </span>
          <Tag text={benchmark.category} color="oklch(0.25 0.05 200)" />
          <span style={{ ...mono, fontSize: "0.65rem", color: "oklch(0.45 0.02 260)", marginLeft: "auto" }}>
            {open ? "\u25B2 collapse" : "\u25BC expand"} \u00B7 {benchmark.tasks.length} tasks
          </span>
        </div>
        <h3 style={{
          fontFamily: "'Space Grotesk', sans-serif", fontSize: "1.1rem",
          fontWeight: 600, color: "oklch(0.92 0.01 220)", lineHeight: 1.3, marginBottom: "0.3rem",
        }}>
          {benchmark.title}
        </h3>
        <p style={{ ...mono, fontSize: "0.72rem", color: "oklch(0.55 0.04 200)", margin: 0 }}>
          Commercial relevance: {benchmark.commercial}
        </p>
      </button>

      {open && (
        <div style={{ padding: "0 1.5rem 1.5rem" }}>
          <div style={{ height: "1px", background: "oklch(0.22 0.02 260)", marginBottom: "1.25rem" }} />

          <SectionLabel title="Why Julian Should Excel Here" />
          <p style={prose}>{benchmark.whyJulianExcels}</p>

          <SectionLabel title="Research Basis" />
          <div style={{ display: "flex", flexDirection: "column", gap: "0.25rem", marginBottom: "1.25rem" }}>
            {benchmark.researchBasis.map((r, i) => (
              <span key={i} style={{ ...prose, fontSize: "0.82rem", margin: 0, paddingLeft: "0.75rem", borderLeft: "2px solid oklch(0.3 0.06 200)" }}>
                {r}
              </span>
            ))}
          </div>

          <SectionLabel title="Tasks" />
          {benchmark.tasks.map((t, i) => <TaskCard key={i} task={t} benchmarkId={benchmark.id} />)}
        </div>
      )}
    </div>
  );
}

function PredictionsSection() {
  return (
    <div style={{ ...card, padding: "1.75rem" }}>
      <h2 style={h2s}>Predicted Performance by Condition</h2>
      <p style={{ ...prose, marginBottom: "1.25rem" }}>
        Predictions based on the research findings, before running any benchmarks. These should be falsifiable — if Julian doesn't outperform on the tasks marked as his strengths, the research basis needs re-examination.
      </p>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 700 }}>
          <thead>
            <tr>
              {["Task", "Bare", "Shallow", "Julian Solo", "Julian + Team", "Predicted Winner", "Rationale"].map(h => (
                <th key={h} style={{
                  textAlign: "left", padding: "0.5rem 0.6rem",
                  borderBottom: "2px solid oklch(0.25 0.02 240)",
                  ...mono, color: "oklch(0.55 0.02 260)", fontWeight: 600,
                  textTransform: "uppercase", fontSize: "0.62rem",
                  letterSpacing: "0.08em",
                }}>
                  {h}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {PREDICTION_TABLE.map((row, i) => {
              const winColor = row.strongest === "team" ? "oklch(0.75 0.10 200)" : "oklch(0.75 0.10 155)";
              return (
                <tr key={i}>
                  <td style={{ ...mono, padding: "0.5rem 0.6rem", color: "oklch(0.8 0.02 270)", borderBottom: "1px solid oklch(0.18 0.02 240)", fontSize: "0.75rem" }}>
                    {row.task}
                  </td>
                  <td style={{ ...mono, padding: "0.5rem 0.6rem", color: "oklch(0.5 0.02 260)", borderBottom: "1px solid oklch(0.18 0.02 240)", fontSize: "0.75rem" }}>
                    {row.bare}
                  </td>
                  <td style={{ ...mono, padding: "0.5rem 0.6rem", color: "oklch(0.5 0.02 260)", borderBottom: "1px solid oklch(0.18 0.02 240)", fontSize: "0.75rem" }}>
                    {row.shallow}
                  </td>
                  <td style={{ ...mono, padding: "0.5rem 0.6rem", color: row.strongest === "solo" ? "oklch(0.85 0.10 155)" : "oklch(0.65 0.02 270)", fontWeight: row.strongest === "solo" ? 700 : 400, borderBottom: "1px solid oklch(0.18 0.02 240)", fontSize: "0.75rem" }}>
                    {row.solo}
                  </td>
                  <td style={{ ...mono, padding: "0.5rem 0.6rem", color: row.strongest === "team" ? "oklch(0.85 0.10 200)" : "oklch(0.65 0.02 270)", fontWeight: row.strongest === "team" ? 700 : 400, borderBottom: "1px solid oklch(0.18 0.02 240)", fontSize: "0.75rem" }}>
                    {row.team}
                  </td>
                  <td style={{ ...mono, padding: "0.5rem 0.6rem", color: winColor, fontWeight: 600, borderBottom: "1px solid oklch(0.18 0.02 240)", fontSize: "0.75rem", textTransform: "capitalize" }}>
                    {row.strongest}
                  </td>
                  <td style={{ ...mono, padding: "0.5rem 0.6rem", color: "oklch(0.58 0.02 260)", borderBottom: "1px solid oklch(0.18 0.02 240)", fontSize: "0.7rem", fontFamily: "'DM Sans', sans-serif" }}>
                    {row.reason}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: "1rem", display: "flex", gap: "1.5rem" }}>
        <span style={{ ...mono, fontSize: "0.68rem" }}>
          <span style={{ color: "oklch(0.75 0.10 155)", fontWeight: 600 }}>{"\u25CF"}</span>{" "}
          <span style={{ color: "oklch(0.55 0.02 260)" }}>Julian Solo predicted winner</span>
        </span>
        <span style={{ ...mono, fontSize: "0.68rem" }}>
          <span style={{ color: "oklch(0.75 0.10 200)", fontWeight: 600 }}>{"\u25CF"}</span>{" "}
          <span style={{ color: "oklch(0.55 0.02 260)" }}>Julian + Team predicted winner</span>
        </span>
      </div>
    </div>
  );
}

function RunbookSection() {
  return (
    <div style={{ ...card, padding: "1.75rem" }}>
      <h2 style={h2s}>How to Run These</h2>
      <p style={prose}>
        A practical sequence for getting started without boiling the ocean.
      </p>

      <h3 style={{ ...h3s, marginTop: "0.5rem" }}>Phase 1: Quick Smoke Test (1 day)</h3>
      <p style={prose}>
        Pick one task from the "predicted team winner" column and one from "predicted solo winner." Run each under all four conditions once. Don't score with a rubric yet — just read the outputs side by side and note your gut reaction. If there's no visible difference, the benchmark design needs tightening before investing in formal evaluation.
      </p>

      <h3 style={h3s}>Phase 2: Focused Evaluation (1 week)</h3>
      <p style={prose}>
        Choose the three benchmarks you care about most commercially. Run each task under all four conditions, three times each (12 runs per task, 72 total across three benchmarks). Score with rubrics. Look for: (a) mean score differences between conditions, (b) variance within conditions (Julian should show lower variance per the Double-Edged Sword paper), (c) cost differences.
      </p>

      <h3 style={h3s}>Phase 3: Longitudinal Test (1 month)</h3>
      <p style={prose}>
        This is where Julian's persistent memory advantage should become visible. Run the same tasks weekly, allowing Julian's memory to accumulate. The Collaborative Tools paper predicts 5-9% improvement from institutional knowledge — but Julian's deliberate memory curation may amplify this. Track whether scores improve over the month for Julian Solo but stay flat for Bare Claude. This is the test no existing paper has run.
      </p>

      <div style={{
        marginTop: "1.25rem", padding: "1rem",
        background: "oklch(0.20 0.04 280)", borderRadius: "6px",
        border: "1px solid oklch(0.28 0.06 280)",
      }}>
        <p style={{ ...prose, margin: 0, fontSize: "0.85rem", color: "oklch(0.82 0.06 280)" }}>
          <strong>Minimum viable benchmark:</strong> If you only run one test, run the Contradictory Sources Brief with all four conditions. It engages the most research-supported advantages (multi-perspective, articulation, structured deliberation) and produces outputs that are easy to evaluate — you can check factual claims against the source materials.
        </p>
      </div>
    </div>
  );
}

function NavBtn({ lbl, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: active ? "oklch(0.22 0.04 200)" : "transparent",
      border: "none",
      borderLeft: active ? "2px solid oklch(0.6 0.10 200)" : "2px solid transparent",
      padding: "0.45rem 0.75rem", cursor: "pointer",
      fontFamily: "'DM Sans', sans-serif", fontSize: "0.8rem",
      color: active ? "oklch(0.85 0.06 200)" : "oklch(0.55 0.02 260)",
      textAlign: "left", display: "block", width: "100%",
      transition: "all 0.15s ease", borderRadius: "0 4px 4px 0",
    }}>
      {lbl}
    </button>
  );
}

const NAV = [
  { id: "design", label: "Experimental Design" },
  { id: "benchmarks", label: "Benchmarks" },
  { id: "predictions", label: "Predictions" },
  { id: "runbook", label: "How to Run" },
];

function App() {
  const [activeSection, setActiveSection] = useState("design");
  const refs = useRef({});

  const scrollTo = (id) => {
    setActiveSection(id);
    refs.current[id]?.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => { for (const e of entries) { if (e.isIntersecting) setActiveSection(e.target.id); } },
      { rootMargin: "-80px 0px -60% 0px" }
    );
    Object.values(refs.current).forEach(el => { if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, []);

  return (
    <div style={{ minHeight: "100vh", background: "oklch(0.12 0.02 255)" }}>
      <Header />
      <div className="layout-grid" style={{
        display: "grid", gridTemplateColumns: "180px 1fr",
        maxWidth: 1100, margin: "0 auto", gap: "2rem",
        padding: "2rem 1.5rem 4rem",
      }}>
        <nav className="sidebar-nav" style={{
          position: "sticky", top: "1.5rem", alignSelf: "start",
          display: "flex", flexDirection: "column", gap: "0.15rem",
        }}>
          {NAV.map(s => <NavBtn key={s.id} lbl={s.label} active={activeSection === s.id} onClick={() => scrollTo(s.id)} />)}
        </nav>

        <main>
          <section id="design" ref={el => refs.current.design = el}>
            <ExperimentalDesignSection />
          </section>

          <section id="benchmarks" ref={el => refs.current.benchmarks = el} style={{ marginTop: "1.5rem" }}>
            <h2 style={{ ...h2s, marginBottom: "0.5rem" }}>Benchmark Categories</h2>
            <p style={{ ...prose, marginBottom: "1.25rem" }}>
              Six categories, twelve tasks, each with full prompts, scoring rubrics, and domain variants. Click to expand.
            </p>
            {BENCHMARKS.map(b => <BenchmarkSection key={b.id} benchmark={b} />)}
          </section>

          <section id="predictions" ref={el => refs.current.predictions = el} style={{ marginTop: "1.5rem" }}>
            <PredictionsSection />
          </section>

          <section id="runbook" ref={el => refs.current.runbook = el} style={{ marginTop: "1.5rem" }}>
            <RunbookSection />
          </section>
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
